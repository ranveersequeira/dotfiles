#######################################
# PREFIX
#######################################
set -g prefix C-\\
set -g prefix2 C-a
unbind C-b
bind C-\\ send-prefix
bind C-a send-prefix

#######################################
# GENERAL
#######################################
set -sg escape-time 0
set -g history-limit 1000000
set -g base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g status-position bottom
set -g set-clipboard on

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

set -g pane-active-border-style 'fg=#fabd2f'
set -g pane-border-style 'fg=#504945'

set -g status on
set -g status-interval 5
set -g status-left-length 80
set -g status-right-length 140
set -g status-style 'fg=#ebdbb2,bg=#282828'
set -g status-left '#[fg=#282828,bg=#b8bb26,bold] #S #[fg=#b8bb26,bg=#282828] '
set -g status-right '#[fg=#504945,bg=#282828]#[fg=#ebdbb2,bg=#504945] cal #(~/.config/tmux/scripts/calendar-status.sh) #[fg=#282828,bg=#fabd2f,bold] %H:%M '
set -g window-status-separator ''
set -g window-status-format '#[fg=#a89984,bg=#282828] #I:#{pane_current_command} '
set -g window-status-current-format '#[fg=#282828,bg=#fabd2f,bold] #I:#{pane_current_command}#{?window_zoomed_flag, (Z),} '

#######################################
# PANES
#######################################
unbind '"'
unbind %

bind / split-window -h
bind , split-window -v
bind z resize-pane -Z

bind -r Left resize-pane -L 2
bind -r Down resize-pane -D 2
bind -r Up resize-pane -U 2
bind -r Right resize-pane -R 2

bind -r C-Left resize-pane -L 10
bind -r C-Down resize-pane -D 10
bind -r C-Up resize-pane -U 10
bind -r C-Right resize-pane -R 10

bind Space next-layout
bind -r M-1 select-layout even-horizontal
bind -r M-2 select-layout even-vertical
bind -r M-3 select-layout main-horizontal
bind -r M-4 select-layout main-vertical
bind -r M-5 select-layout tiled

#######################################
# COPY MODE
#######################################
setw -g mode-keys vi

bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

#######################################
# SESSION
#######################################
bind t command-prompt -p "New session:" "new-session -s '%%'"

#######################################
# RELOAD
#######################################
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

#######################################
# PLUGINS
#######################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'rickstaa/tmux-notify'

#######################################
# FZF URL
#######################################
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

#######################################
# FLOAX
#######################################
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#fabd2f'
set -g @floax-text-color '#83a598'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

#######################################
# SESSIONX
#######################################
set -g @sessionx-bind 'o'
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-filter-current 'false'
set -g @sessionx-custom-paths-subdirectories 'false'

# Change this path to your own dotfiles path if needed.
set -g @sessionx-custom-paths "$HOME/dotfiles"
set -g @sessionx-x-path "$HOME/dotfiles"

#######################################
# GRUVBOX
#######################################
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"
set -g allow-rename off

#######################################
# CALENDAR MEETING REMINDER

# This shows your next meeting from:
# ~/.config/tmux/scripts/calendar-status.sh
#
# It is kept as plain status-right so the reminder does not depend on a theme plugin.

#######################################
# VIM TMUX NAVIGATOR
#######################################
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -n 'C-Space' if-shell "$is_vim" 'send-keys C-Space' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-Space' select-pane -l

#######################################
# TPM
# Keep this last.
#######################################
run '~/.tmux/plugins/tpm/tpm'
